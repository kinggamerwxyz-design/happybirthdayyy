<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Birthday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#190f38;
    --bg-bottom:#3a1f52;
    --gold:#f3c46e;
    --gold-soft:#f3c46e99;
    --rose:#ff9eb3;
    --cream:#fbeee0;
    --ink:#2a1b3d;
    --card-bg:rgba(255,246,232,0.07);
    --card-border:rgba(243,196,110,0.35);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    min-height:100%;
  }

  body{
    background:radial-gradient(ellipse at 50% -10%, #4a2a63 0%, var(--bg-top) 45%, var(--bg-bottom) 100%);
    color:var(--cream);
    font-family:'Quicksand', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    overflow-y:auto;
    position:relative;
  }

  /* ambient glow blobs */
  .bg-glow{
    position:fixed;
    border-radius:50%;
    filter:blur(70px);
    pointer-events:none;
    z-index:0;
  }
  .glow-a{ width:340px; height:340px; background:var(--rose); opacity:0.18; top:-80px; left:-80px; }
  .glow-b{ width:380px; height:380px; background:var(--gold); opacity:0.14; bottom:-120px; right:-100px; }

  /* twinkling stars */
  .stars{ position:fixed; inset:0; z-index:0; pointer-events:none; }
  .star{
    position:absolute;
    background:var(--cream);
    border-radius:50%;
    opacity:0.6;
    animation:twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0.15; transform:scale(0.8); }
    50%{ opacity:0.85; transform:scale(1.15); }
  }

  .scene{
    position:relative;
    z-index:1;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 24px;
  }

  /* ---------- Envelope ---------- */
  .envelope-wrap{
    text-align:center;
    cursor:pointer;
    user-select:none;
    transition:opacity 0.4s ease, transform 0.4s ease;
  }

  .envelope{
    width:200px;
    height:130px;
    margin:0 auto 26px;
    position:relative;
    perspective:600px;
    filter:drop-shadow(0 12px 24px rgba(0,0,0,0.35));
  }

  .env-back{
    position:absolute;
    inset:0;
    background:linear-gradient(160deg,#fff7ec,#f3e3c9);
    border-radius:8px;
  }

  .env-flap{
    position:absolute;
    top:0; left:0; right:0;
    height:0;
    border-left:100px solid transparent;
    border-right:100px solid transparent;
    border-top:72px solid #e8cfa0;
    transform-origin:top;
    transition:transform 0.6s cubic-bezier(.6,-0.2,.3,1.3);
    border-radius:8px 8px 0 0;
  }

  .envelope.open .env-flap{
    transform:rotateX(180deg);
  }

  .env-seal{
    position:absolute;
    top:46px; left:50%;
    transform:translate(-50%,0);
    width:34px; height:34px;
    background:var(--rose);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:#fff7ec;
    font-size:16px;
    box-shadow:0 4px 10px rgba(0,0,0,0.25);
    transition:opacity 0.3s ease, transform 0.3s ease;
    z-index:2;
  }

  .envelope.open .env-seal{
    opacity:0;
    transform:translate(-50%,0) scale(0.4);
  }

  .env-label{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:21px;
    margin:0 0 6px;
    color:var(--cream);
  }

  .env-hint{
    font-family:'Caveat', cursive;
    font-size:19px;
    color:var(--gold);
    margin:0;
    animation:bob 2.2s ease-in-out infinite;
  }

  @keyframes bob{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(4px); }
  }

  .envelope-wrap.fading{
    opacity:0;
    transform:scale(0.92);
  }

  /* ---------- Card ---------- */
  .card{
    width:100%;
    max-width:480px;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:22px;
    padding:38px 30px 30px;
    text-align:center;
    backdrop-filter:blur(10px);
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    position:relative;
    opacity:0;
    transform:scale(0.94);
    transition:opacity 0.5s ease, transform 0.5s ease;
  }

  .card.show{
    opacity:1;
    transform:scale(1);
  }

  .corner{
    position:absolute;
    width:46px;
    height:46px;
    color:var(--gold-soft);
    opacity:0.8;
  }
  .corner-tl{ top:12px; left:12px; }
  .corner-br{ bottom:12px; right:12px; transform:rotate(180deg); }

  .eyebrow{
    font-family:'Caveat', cursive;
    font-size:20px;
    color:var(--gold);
    letter-spacing:0.5px;
    margin-bottom:6px;
  }

  .perspective-wrap{
    perspective:900px;
  }

  .content-inner{
    transition:transform 0.38s ease, opacity 0.38s ease;
    transform-style:preserve-3d;
    min-height:130px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
  }

  .content-inner.leaving{
    opacity:0;
    transform:rotateY(-14deg) translateX(-10px);
  }

  .message{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:600;
    font-size:clamp(21px, 5.4vw, 26px);
    line-height:1.45;
    color:var(--cream);
    padding:0 4px;
    width:100%;
    transition:opacity 0.35s ease;
  }

  /* long, flowing message (e.g. the twilight note) */
  .message.prose{
    text-align:left;
    font-weight:500;
    font-size:clamp(15.5px, 3.6vw, 17.5px);
    line-height:1.8;
  }

  .message.prose .quote{
    display:block;
    border-left:2px solid var(--gold-soft);
    padding-left:16px;
    margin-bottom:16px;
    color:rgba(251,238,224,0.88);
  }

  .message.prose .addr{
    display:block;
    color:var(--cream);
    font-weight:600;
  }

  /* short, casual multi-line note (e.g. the song message) */
  .message.lines{
    font-size:clamp(17px, 4vw, 19px);
    font-weight:500;
    line-height:1.7;
  }

  .audio-wrap{ width:100%; }
  audio{
    width:100%;
    accent-color:var(--gold);
  }

  /* ---------- Finale: cake & candle ---------- */
  .finale-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    margin-top:4px;
  }

  .cake{ width:130px; height:auto; }

  .flame{
    transform-origin:50% 100%;
    animation:flicker 1.1s ease-in-out infinite;
    transition:opacity 0.5s ease, transform 0.5s ease;
  }
  .flame.out{
    opacity:0;
    transform:scaleY(0.2);
  }

  @keyframes flicker{
    0%,100%{ transform:scaleY(1) scaleX(1) rotate(-2deg); }
    50%{ transform:scaleY(1.12) scaleX(0.92) rotate(2deg); }
  }

  .blow-btn{
    background:linear-gradient(135deg, var(--gold), #ffe0a3);
    color:var(--ink);
    border:none;
    border-radius:30px;
    padding:14px 30px;
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:17px;
    letter-spacing:0.2px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(243,196,110,0.45);
    animation:blow-pulse 1.7s ease-in-out infinite;
    transition:transform 0.15s ease, background 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
  }
  .blow-btn:hover{ transform:translateY(-2px) scale(1.05); }
  .blow-btn:disabled{ opacity:0.55; cursor:default; transform:none; animation:none; box-shadow:none; }

  @keyframes blow-pulse{
    0%{ box-shadow:0 4px 14px rgba(243,196,110,0.45), 0 0 0 0 rgba(243,196,110,0.5); transform:scale(1); }
    50%{ box-shadow:0 4px 14px rgba(243,196,110,0.45), 0 0 0 12px rgba(243,196,110,0); transform:scale(1.05); }
    100%{ box-shadow:0 4px 14px rgba(243,196,110,0.45), 0 0 0 0 rgba(243,196,110,0); transform:scale(1); }
  }

  /* ---------- Nav ---------- */
  .nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:28px;
  }

  button.nav-btn{
    padding:10px 20px;
    font-size:15px;
    font-weight:700;
    font-family:'Quicksand', sans-serif;
    cursor:pointer;
    border:1px solid var(--card-border);
    border-radius:30px;
    background:rgba(255,255,255,0.06);
    color:var(--cream);
    transition:transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
  }

  button.nav-btn:hover:not(:disabled){
    background:var(--rose);
    color:var(--ink);
    transform:translateY(-2px);
  }

  button.nav-btn:disabled{
    opacity:0.35;
    cursor:not-allowed;
  }

  button:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }

  .dots{ display:flex; gap:8px; }
  .dot{
    width:8px; height:8px;
    border-radius:50%;
    background:rgba(255,255,255,0.25);
    transition:background 0.3s ease, transform 0.3s ease;
  }
  .dot.active{
    background:var(--gold);
    transform:scale(1.35);
  }

  /* confetti */
  .confetti-piece{
    position:fixed;
    top:-10px;
    pointer-events:none;
    z-index:5;
    animation-name:confetti-fall;
    animation-timing-function:ease-in;
    animation-fill-mode:forwards;
  }
  @keyframes confetti-fall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(440px) rotate(360deg); opacity:0; }
  }

  /* ---------- Per-page background image overlay ---------- */
  .card{
    overflow:hidden; /* keeps pseudo overlay clipped to card corners */
  }

  .page-bg{
    position:absolute;
    inset:0;
    border-radius:22px;
    background-size:cover;
    background-position:center;
    opacity:0;
    transition:opacity 0.5s ease;
    pointer-events:none;
    z-index:0;
  }
  .page-bg.visible{ opacity:0.2; } /* image at ~35% */

  /* push card content above the overlay */
  .eyebrow, .perspective-wrap, .nav, .corner{ position:relative; z-index:1; }

  @media (max-width:480px){
    .card{ padding:30px 20px 24px; border-radius:18px; }
    .page-bg{ border-radius:18px; }
  }

  /* ---------- Post-blow message styles ---------- */
  .blown-message{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    text-align:center;
  }
  .blown-title{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:700;
    font-size:clamp(26px, 6.5vw, 34px);
    line-height:1.3;
    color:var(--gold);
    display:block;
  }
  .blown-note{
    font-family:'Caveat', cursive;
    font-size:clamp(16px, 4vw, 20px);
    line-height:1.7;
    color:var(--cream);
    opacity:0.9;
    display:block;
  }
  .blown-note em{
    color:var(--gold);
    font-style:normal;
    font-weight:600;
  }

  @media (prefers-reduced-motion: reduce){
    .star, .env-hint, .flame, .blow-btn{ animation:none !important; }
    .content-inner, .card, .envelope-wrap, .envelope .env-flap, .env-seal{ transition:opacity 0.2s linear !important; transform:none !important; }
    .confetti-piece{ display:none; }
  }
</style>
</head>
<body>

<div class="bg-glow glow-a"></div>
<div class="bg-glow glow-b"></div>
<div class="stars" id="stars"></div>

<div class="scene">

  <div class="envelope-wrap" id="envelopeWrap">
    <div class="envelope" id="envelope">
      <div class="env-back"></div>
      <div class="env-flap"></div>
      <div class="env-seal">✦</div>
    </div>
    <p class="env-label">A little something for you</p>
    <p class="env-hint">tap the envelope to open ✧</p>
  </div>

  <div class="card" id="card" hidden>
    <!-- per-page background image overlay -->
    <div class="page-bg" id="pageBg"></div>

    <svg class="corner corner-tl" viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="1.4">
      <path d="M4 30 Q4 4 30 4" stroke-dasharray="2 4"/>
      <circle cx="30" cy="4" r="2.4" fill="currentColor" stroke="none"/>
      <circle cx="4" cy="30" r="2.4" fill="currentColor" stroke="none"/>
    </svg>
    <svg class="corner corner-br" viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="1.4">
      <path d="M4 30 Q4 4 30 4" stroke-dasharray="2 4"/>
      <circle cx="30" cy="4" r="2.4" fill="currentColor" stroke="none"/>
      <circle cx="4" cy="30" r="2.4" fill="currentColor" stroke="none"/>
    </svg>

    <div class="eyebrow" id="eyebrow">✦</div>

    <div class="perspective-wrap">
      <div class="content-inner" id="contentInner">
        <div class="message" id="text"></div>
        <div class="audio-wrap" id="audioWrap"></div>
        <div class="finale-wrap" id="finaleWrap"></div>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn" id="backBtn">‹ Back</button>
      <div class="dots" id="dots"></div>
      <button class="nav-btn" id="nextBtn">Next ›</button>
    </div>
  </div>

</div>

<script>
  /* =========================================================
     EDIT YOUR PAGES HERE.
     - "text": plain message shown on that page (short, centered).
     - "html": use instead of "text" for richer formatting, e.g.
               wrapping a quoted part in <span class="quote">...
     - "style": "prose" for a long flowing paragraph (left-aligned),
                "lines" for a short casual multi-line note (centered).
                Leave unset for the original big centered short style.
     - "audio": path/filename to an audio file (e.g. "audio/song.mp3").
                Leave "" if that page has no audio yet.
     - "finale": set to true on exactly one page (usually the last)
                 to show the interactive cake + candle.
     ========================================================= */
  const pages = [
    {
      style: "prose",
      html: `<span class="quote">A soft twilight, stars are visible yet not visible. Kinda confused about the color of the sky. Is it golden yellow? Or magentaish purple? Maybe both, maybe blending into each other. Feels like the birds are calling me to join them, to fly with them, to feel the sky a bit more closely. Clouds are chasing the colors as if they own it. There is a quiet, unspoken presence, not bright enough to notice but strong enough to feel. And just like that, the sky kept changing without ever explaining itself, and I kept watching without needing any answers...</span><span class="addr">If you were a place then I would have described you like this. Sometimes I wonder, we might have never met, but yet met in a really strange way. And I'm glad.</span>`,
      audio: ""
    },
    {
      style: "lines",
      html: `This song is hard to sing tbh, bt i tried my best ;-;<br>Hopefully i didnt ruin it :((<br>Also the guitar part, i literally learnt it while singing the song. Uhh im just bad at these,<br>sorry :(`,
      audio: "audio/song.mp3"
    },
    { preText: "Make a wish, then blow out the candle 🕯️", text: "Happy birthday, Nuhaaaa ✨", audio: "", finale: true }
  ];

  const eyebrowLabels = [
    "A message for you ✦",
    "Sorry for your ear ✦",
    "Enjoy the day ✦"
  ];

  let current = 0;

  const textEl = document.getElementById("text");
  const audioWrap = document.getElementById("audioWrap");
  const finaleWrap = document.getElementById("finaleWrap");
  const contentInner = document.getElementById("contentInner");
  const backBtn = document.getElementById("backBtn");
  const eyebrowEl = document.getElementById("eyebrow");
  const nextBtn = document.getElementById("nextBtn");
  const dotsEl = document.getElementById("dots");
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ---------- ambient stars ---------- */
  function buildStars(n){
    const wrap = document.getElementById("stars");
    for(let i=0;i<n;i++){
      const s = document.createElement("div");
      s.className = "star";
      const size = Math.random()*2.4+1;
      s.style.width = size+"px";
      s.style.height = size+"px";
      s.style.top = Math.random()*100+"%";
      s.style.left = Math.random()*100+"%";
      s.style.animationDelay = (Math.random()*3.5)+"s";
      wrap.appendChild(s);
    }
  }
  buildStars(reduceMotion ? 0 : 55);

  /* ---------- envelope ---------- */
  const envelopeWrap = document.getElementById("envelopeWrap");
  const envelope = document.getElementById("envelope");
  const card = document.getElementById("card");

  envelopeWrap.addEventListener("click", () => {
    envelope.classList.add("open");
    setTimeout(() => {
      envelopeWrap.classList.add("fading");
    }, 350);
    setTimeout(() => {
      envelopeWrap.style.display = "none";
      card.hidden = false;
      requestAnimationFrame(() => card.classList.add("show"));
      renderPage();
    }, 750);
  });

  function reopenEnvelope(){
    card.classList.remove("show");
    setTimeout(() => {
      card.hidden = true;
      envelope.classList.remove("open");
      envelopeWrap.style.display = "";
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          envelopeWrap.classList.remove("fading");
        });
      });
      current = 0;
      candleBlown = false;
    }, reduceMotion ? 0 : 500);
  }

  /* ---------- dots ---------- */
  function buildDots(){
    dotsEl.innerHTML = "";
    pages.forEach((_, i) => {
      const d = document.createElement("div");
      d.className = "dot" + (i === current ? " active" : "");
      dotsEl.appendChild(d);
    });
  }

  /* ---------- cake markup ---------- */
  function cakeMarkup(){
    return `
      <svg class="cake" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
        <g class="flame" id="flame">
          <path d="M60 8 C 54 18, 54 26, 60 30 C 66 26, 66 18, 60 8 Z" fill="#ffce6b"/>
          <path d="M60 14 C 57 20, 57 25, 60 27 C 63 25, 63 20, 60 14 Z" fill="#ff8a3d"/>
        </g>
        <rect x="57" y="28" width="6" height="14" rx="1.5" fill="#fbeee0"/>
        <rect x="20" y="64" width="80" height="28" rx="6" fill="#ffb6c1"/>
        <rect x="20" y="50" width="80" height="18" rx="6" fill="#fff1d6"/>
        <rect x="14" y="86" width="92" height="10" rx="5" fill="#f3c46e"/>
      </svg>
      <button class="blow-btn" id="blowBtn">🕯️ Blow out the candle</button>
    `;
  }

  function igniteFlame(revealText){
    const flame = document.getElementById("flame");
    const btn = document.getElementById("blowBtn");
    if(!flame || !btn) return;
    flame.classList.remove("out");
    btn.disabled = false;
    btn.textContent = "🕯️ Blow out the candle";
    btn.onclick = () => {
      flame.classList.add("out");
      btn.disabled = true;
      btn.textContent = "🎉 Yay!";
      candleBlown = true;
      burstConfetti();
      // Switch to bg4.jpg
      applyPageBg(current, true);
      if(revealText){
        textEl.style.opacity = "0";
        setTimeout(() => {
          textEl.innerHTML = `<span class="blown-title">${revealText}</span><span class="blown-note">Really really glad to have a friend like you,&nbsp; Wishing you all the happiness your heart can hold.<br><em>—Shishir</em></span>`;
          textEl.className = "message blown-message";
          textEl.style.opacity = "1";
        }, reduceMotion ? 0 : 350);
      }
    };
  }

  function burstConfetti(){
    if(reduceMotion) return;
    const colors = ["#f3c46e", "#ff9eb3", "#fbeee0", "#caa6e0"];
    const rect = card.getBoundingClientRect();
    for(let i=0;i<46;i++){
      const piece = document.createElement("div");
      piece.className = "confetti-piece";
      const isCircle = Math.random() > 0.5;
      const size = Math.random()*6+5;
      piece.style.width = size+"px";
      piece.style.height = size+"px";
      piece.style.background = colors[Math.floor(Math.random()*colors.length)];
      piece.style.borderRadius = isCircle ? "50%" : "2px";
      piece.style.left = (rect.left + Math.random()*rect.width)+"px";
      piece.style.top = (rect.top - 10)+"px";
      const duration = (Math.random()*1.2+1.4);
      piece.style.animationDuration = duration+"s";
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), duration*1000+100);
    }
  }

  const pageBg = document.getElementById("pageBg");

  /* Fixed background images: place files in the SAME folder as this HTML.
     Page 2 → bg2.jpg   |   Page 3 → bg3.jpg   |   After blow → bg4.jpg */
  const bgImages = { 0: "bg2.jpg", 1: "bg3.jpg" };
  let candleBlown = false;

  function applyPageBg(idx, blown){
    let img = bgImages[idx];
    if(blown) img = "bg4.jpg";
    if(img){
      pageBg.style.backgroundImage = `url('${img}')`;
      pageBg.classList.add("visible");
    } else {
      pageBg.style.backgroundImage = "";
      pageBg.classList.remove("visible");
    }
  }

  
  function renderPage(){
    const page = pages[current];

    eyebrowEl.textContent = eyebrowLabels[current];

    textEl.className = "message" + (page.style ? " " + page.style : "");
    textEl.style.opacity = "1";
    if(page.finale){
      textEl.innerText = page.preText || "";
    } else if(page.html){
      textEl.innerHTML = page.html;
    } else {
      textEl.innerText = page.text;
    }

    audioWrap.innerHTML = "";
    if(page.audio && page.audio.trim() !== ""){
      const audio = document.createElement("audio");
      audio.controls = true;
      audio.src = page.audio;
      audioWrap.appendChild(audio);
    }

    finaleWrap.innerHTML = "";
    if(page.finale){
      finaleWrap.innerHTML = cakeMarkup();
      igniteFlame(page.text);
    }

    backBtn.disabled = false;
    backBtn.innerText = current === 0 ? "‹ Envelope" : "‹ Back";
    nextBtn.innerText = current === pages.length - 1 ? "Restart ↺" : "Next ›";

    buildDots();
    applyPageBg(current, candleBlown && pages[current].finale);
  }

  function changePage(direction){
    if(current === pages.length - 1 && direction === 1){
      reopenEnvelope();
      return;
    }

    current = Math.min(Math.max(current + direction, 0), pages.length - 1);
    candleBlown = false;

    if(reduceMotion){
      renderPage();
      return;
    }

    contentInner.classList.add("leaving");
    setTimeout(() => {
      renderPage();
      contentInner.style.transform = "rotateY(14deg) translateX(10px)";
      contentInner.style.opacity = "0";
      contentInner.classList.remove("leaving");
      requestAnimationFrame(() => {
        contentInner.style.transform = "";
        contentInner.style.opacity = "";
      });
    }, 230);
  }

  backBtn.addEventListener("click", () => {
    if(current === 0){
      reopenEnvelope();
    } else {
      changePage(-1);
    }
  });
  nextBtn.addEventListener("click", () => changePage(1));
</script>

</body>
</html>
